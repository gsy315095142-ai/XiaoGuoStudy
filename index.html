<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小郭的学习乐园 🌈</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- 天空装饰 -->
<div class="sun">
  <div class="sun-ray" style="transform: translate(-50%, -50%) rotate(0deg);"></div>
  <div class="sun-ray" style="transform: translate(-50%, -50%) rotate(45deg);"></div>
  <div class="sun-ray" style="transform: translate(-50%, -50%) rotate(90deg);"></div>
  <div class="sun-ray" style="transform: translate(-50%, -50%) rotate(135deg);"></div>
</div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- 草地上的小花 -->
<div class="flowers" id="flowers"></div>

<!-- 星星积分 -->
<div class="star-bar">
  <span class="star-icon">⭐</span>
  <span id="starCount">0</span> 颗星星
</div>

<!-- 主内容 -->
<div class="container">
  <div class="title-area">
    <div class="main-title">🌈 小郭的学习乐园 🌈</div>
    <div class="sub-title">选一个科目开始今天的学习吧！</div>
  </div>

  <div class="cards-area">
    <!-- 语文卡片 -->
    <div class="subject-card card-chinese" onclick="selectSubject('chinese', event)">
      <span class="card-decoration">📖</span>
      <span class="card-decoration">✏️</span>
      <span class="card-decoration">📝</span>
      <span class="card-decoration">📚</span>
      <div class="card-icon">📖</div>
      <div class="card-title">语文</div>
      <div class="card-desc">古诗词 · 成语 · 生字词<br>快来感受汉字的魅力吧！</div>
    </div>

    <!-- 数学卡片 -->
    <div class="subject-card card-math" onclick="selectSubject('math', event)">
      <span class="card-decoration">🔢</span>
      <span class="card-decoration">➕</span>
      <span class="card-decoration">📐</span>
      <span class="card-decoration">✖️</span>
      <div class="card-icon">🔢</div>
      <div class="card-title">数学</div>
      <div class="card-desc">四则运算 · 分数 · 应用题<br>数学达人就是你！</div>
    </div>

    <!-- 英语卡片 -->
    <div class="subject-card card-english" onclick="selectSubject('english', event)">
      <span class="card-decoration">🔤</span>
      <span class="card-decoration">💬</span>
      <span class="card-decoration">🌍</span>
      <span class="card-decoration">🎵</span>
      <div class="card-icon">🔤</div>
      <div class="card-title">英语</div>
      <div class="card-desc">单词拼写 · 听力 · 语法<br>Let's learn English!</div>
    </div>
  </div>
</div>

<!-- 底部小动物 -->
<div class="bottom-animals">
  <div class="animal" onclick="animalClick(this, '🐷')">🐷</div>
  <div class="animal" onclick="animalClick(this, '🐸')">🐸</div>
  <div class="animal" onclick="animalClick(this, '🐰')">🐰</div>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast">
  <span class="toast-emoji" id="toastEmoji"></span>
  <span id="toastText"></span>
</div>

<script src="js/common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
