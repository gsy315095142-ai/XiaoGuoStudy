<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 城堡保卫战 - 四则运算</title>
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="css/math.css">
<link rel="stylesheet" href="css/unit1.css">
</head>
<body>

<!-- 天空装饰 -->
<div class="sun"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>

<!-- 顶部导航栏 -->
<div class="top-bar">
  <a class="back-btn" href="index.html">← 数学乐园</a>
  <div class="page-title">🏰 城堡保卫战</div>
  <div class="star-bar">
    <span class="star-icon">⭐</span>
    <span id="starCount">0</span> 颗星星
  </div>
</div>

<!-- ========== 开始画面 ========== -->
<div class="game-screen" id="startScreen">
  <div class="start-content">
    <div class="game-logo">🏰</div>
    <div class="game-title">城堡保卫战</div>
    <div class="game-subtitle">第一单元 · 四则运算</div>
    <div class="game-rules">
      <p>👾 怪物从天上进攻，每个身上写着答案！</p>
      <p>🎯 点击正确答案的怪物，消灭这一波！</p>
      <p>❌ 点错了城堡受伤，正确答案的怪物落地也伤城堡！</p>
      <p>⏱️ 坚持到时间结束就是胜利！速度越快击退越多！</p>
    </div>
    <div class="difficulty-select">
      <div class="diff-label">选择难度：</div>
      <div class="diff-buttons">
        <button class="diff-btn active" data-diff="1">⭐ 简单</button>
        <button class="diff-btn" data-diff="2">⭐⭐ 中等</button>
        <button class="diff-btn" data-diff="3">⭐⭐⭐ 困难</button>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">⚔️ 保卫城堡！</button>
  </div>
</div>

<!-- ========== 游戏画面（从上到下） ========== -->
<div class="game-screen hidden" id="gameScreen">

  <!-- 1. HUD信息栏 -->
  <div class="game-hud">
    <div class="hud-item hud-wave">🌊 第 <span id="waveDisplay">0</span> 波</div>
    <div class="hud-item hud-score">🏆 <span id="scoreDisplay">0</span></div>
    <div class="hud-item hud-combo" id="comboDisplay"></div>
    <div class="hud-item hud-timer">⏱️ <span id="timerDisplay">90</span>s</div>
  </div>

  <!-- 2. 战场区域（怪物从上往下掉） -->
  <div class="battlefield" id="battlefield"></div>

  <!-- 3. 血量显示 + 城堡 -->
  <div class="castle" id="castle">
    <div class="castle-hp">
      <span id="hpHearts">❤️❤️❤️❤️❤️</span>
    </div>
    <div class="castle-hp-bar">
      <div class="castle-hp-fill" id="hpBar"></div>
    </div>
    <div class="castle-body">🏰</div>
  </div>

  <!-- 4. 题目区域（城堡下方） -->
  <div class="question-area" id="questionArea">
    <div class="question-text" id="questionText"></div>
    <div class="question-hint" id="questionHint"></div>
  </div>

</div>

<!-- ========== 结算画面 ========== -->
<div class="game-screen hidden" id="resultScreen">
  <div class="result-content">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">守城成功！</div>
    <div class="result-stats">
      <div class="stat-row">
        <span class="stat-label">胜负</span>
        <span class="stat-value" id="resultOutcome">胜利</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">得分</span>
        <span class="stat-value" id="resultScore">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">击退敌波</span>
        <span class="stat-value" id="resultWave">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">剩余血量</span>
        <span class="stat-value" id="resultHP">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">正确率</span>
        <span class="stat-value" id="resultRate">0%</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">获得星星</span>
        <span class="stat-value star-value" id="resultStars">⭐ 0</span>
      </div>
    </div>
    <div class="result-buttons">
      <button class="replay-btn" onclick="restartGame()">🔄 再来一局</button>
      <a class="back-btn-result" href="index.html">🏠 返回数学乐园</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-emoji" id="toastEmoji"></span>
  <span id="toastText"></span>
</div>

<script src="../js/common.js"></script>
<script src="js/unit1.js"></script>
</body>
</html>
