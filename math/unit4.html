<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 小数实验室 - 小数的意义和性质</title>
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="css/math.css">
<link rel="stylesheet" href="css/unit4.css">
</head>
<body>

<!-- 实验室气泡背景装饰 -->
<div class="lab-bubble lb-1"></div>
<div class="lab-bubble lb-2"></div>
<div class="lab-bubble lb-3"></div>
<div class="lab-bubble lb-4"></div>
<div class="lab-bubble lb-5"></div>
<div class="lab-bubble lb-6"></div>

<!-- 顶部导航栏 -->
<div class="top-bar">
  <a class="back-btn" href="index.html">← 数学乐园</a>
  <div class="page-title">🧪 小数实验室</div>
  <div class="star-bar">
    <span class="star-icon">⭐</span>
    <span id="starCount">0</span>
  </div>
</div>

<!-- ========== 开始画面 ========== -->
<div class="game-screen" id="startScreen">
  <div class="start-content">
    <div class="game-logo">🧪</div>
    <div class="game-title">小数实验室</div>
    <div class="game-subtitle">第四单元 · 小数的意义和性质<br>滴下神奇的药水，玩转小数！</div>

    <div class="chapter-grid">
      <div class="chapter-card" onclick="selectChapter(1, event)">
        <div class="chapter-icon">📖</div>
        <div class="chapter-info">
          <div class="chapter-name">第一章：小数诞生</div>
          <div class="chapter-desc">看方格涂色 → 选出正确小数 · 理解小数的意义</div>
        </div>
        <div class="chapter-stars">⭐</div>
      </div>
      <div class="chapter-card" onclick="selectChapter(2, event)">
        <div class="chapter-icon">⚖️</div>
        <div class="chapter-info">
          <div class="chapter-name">第二章：大小天平</div>
          <div class="chapter-desc">比较小数大小 · 拖放数字到天平上</div>
        </div>
        <div class="chapter-stars">⭐⭐</div>
      </div>
      <div class="chapter-card" onclick="selectChapter(3, event)">
        <div class="chapter-icon">🧪</div>
        <div class="chapter-info">
          <div class="chapter-name">第三章：魔幻药水</div>
          <div class="chapter-desc">小数点移动 ×10÷10 · 单位换算挑战</div>
        </div>
        <div class="chapter-stars">⭐⭐⭐</div>
      </div>
      <div class="chapter-card" onclick="selectChapter(4, event)">
        <div class="chapter-icon">🎯</div>
        <div class="chapter-info">
          <div class="chapter-name">第四章：精密刻度</div>
          <div class="chapter-desc">四舍五入求近似数 · 保留指定位数小数</div>
        </div>
        <div class="chapter-stars">⭐⭐⭐</div>
      </div>
    </div>
  </div>
</div>

<!-- ========== 游戏画面 ========== -->
<div class="game-screen hidden" id="gameScreen">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-item" id="heartsDisplay">❤️❤️❤️</div>
    <div class="hud-item">🎯 <span id="scoreDisplay">0</span></div>
    <div class="hud-item" id="comboDisplay"></div>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">1/5</div>
  </div>

  <!-- 关卡信息 -->
  <div class="level-info" id="levelInfo">第 1 关</div>
  <div class="question-text" id="questionText"></div>

  <!-- ============ 模式1：小数诞生（方格涂色 → 点选小数） ============ -->
  <div class="mode-area hidden" id="mode1">
    <div class="grid-container" id="gridContainer"></div>
    <div class="fraction-display" id="fractionDisplay"></div>
    <div class="grid-choices" id="gridChoices"></div>
    <div class="action-hint" id="actionHint1">👆 数一数涂色的方格，选出对应的小数！</div>
  </div>

  <!-- ============ 模式2：大小天平 ============ -->
  <div class="mode-area hidden" id="mode2">
    <div class="balance-stage">
      <div class="balance-side left-side">
        <div class="balance-number" id="balanceLeft"></div>
        <div class="balance-pan">❓</div>
      </div>
      <div class="balance-beam" id="balanceBeam"></div>
      <div class="balance-side right-side">
        <div class="balance-number" id="balanceRight"></div>
        <div class="balance-pan">❓</div>
      </div>
    </div>
    <div class="choice-btns" id="choiceBtns2"></div>
  </div>

  <!-- ============ 模式3：魔幻药水 ============ -->
  <div class="mode-area hidden" id="mode3">
    <div class="potion-stage">
      <div class="target-display">
        <span class="target-label">目标</span>
        <span class="target-value" id="potionTarget"></span>
      </div>
      <div class="flask" id="flask">
        <div class="flask-number" id="flaskNumber"></div>
        <div class="flask-liquid"></div>
      </div>
      <div class="potion-shelf">
        <button class="potion-btn potion-red" onclick="usePotion('right')">🔴 ×10 ➡️</button>
        <button class="potion-btn potion-blue" onclick="usePotion('left')">⬅️ ÷10 🔵</button>
        <button class="potion-btn potion-green" onclick="usePotion('reset')">🔄 重置</button>
      </div>
    </div>
    <div class="action-hint" id="potionHint">🧪 点击药水让数字变成目标值！</div>
  </div>

  <!-- ============ 模式4：精密刻度 ============ -->
  <div class="mode-area hidden" id="mode4">
    <div class="ruler-stage">
      <div class="ruler-number" id="rulerNumber"></div>
      <div class="ruler-hint" id="rulerHint"></div>
      <div class="ruler-choices" id="rulerChoices"></div>
    </div>
  </div>
</div>

<!-- ========== 结果画面 ========== -->
<div class="game-screen hidden" id="resultScreen">
  <div class="result-content">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">闯关成功！</div>
    <div id="resultStats"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry" onclick="restartGame()">🔄 再来一次</button>
      <a class="result-btn btn-back" href="index.html">🏠 返回数学乐园</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-emoji" id="toastEmoji"></span>
  <span id="toastText"></span>
</div>

<script src="../js/common.js"></script>
<script src="js/unit4.js"></script>
</body>
</html>
